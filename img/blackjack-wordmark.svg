<svg width="1180" height="320" viewBox="0 0 1180 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="badgeClip">
      <circle cx="154" cy="160" r="108"/>
    </clipPath>
    <linearGradient id="outerRing" x1="44" y1="38" x2="248" y2="262" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7DE97"/>
      <stop offset="0.42" stop-color="#C8932B"/>
      <stop offset="1" stop-color="#5E3B12"/>
    </linearGradient>
    <linearGradient id="innerRing" x1="86" y1="76" x2="226" y2="236" gradientUnits="userSpaceOnUse">
      <stop stop-color="#26241F"/>
      <stop offset="1" stop-color="#080A0A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(154 118) rotate(90) scale(124)">
      <stop stop-color="#35F36D" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#35F36D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="plate" x1="282" y1="48" x2="1128" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#161B1A"/>
      <stop offset="1" stop-color="#060808"/>
    </linearGradient>
    <linearGradient id="letter" x1="705" y1="76" x2="705" y2="212" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF4CB"/>
      <stop offset="0.5" stop-color="#F0C868"/>
      <stop offset="1" stop-color="#85581C"/>
    </linearGradient>
  </defs>

  <rect width="1180" height="320" rx="64" fill="rgba(3,7,7,0.24)"/>
  <circle cx="154" cy="160" r="118" fill="url(#outerRing)"/>
  <circle cx="154" cy="160" r="108" fill="url(#innerRing)"/>
  <circle cx="154" cy="160" r="105" fill="url(#glow)"/>

  <g clip-path="url(#badgeClip)">
    <image href="blackjack_logo.png" x="20" y="6" width="268" height="268" preserveAspectRatio="xMidYMin slice"/>
    <rect x="46" y="46" width="216" height="216" fill="url(#glow)"/>
  </g>

  <rect x="300" y="54" width="844" height="212" rx="46" fill="url(#plate)" stroke="rgba(255,255,255,0.12)"/>
  <text x="346" y="184" fill="url(#letter)" font-family="Cinzel, Georgia, serif" font-size="128" font-weight="800" letter-spacing="4">BLACKJACK</text>
  <path d="M350 222H1110" stroke="#F0C868" stroke-opacity="0.34" stroke-width="3" stroke-linecap="round"/>
</svg>
