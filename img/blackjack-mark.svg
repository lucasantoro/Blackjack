<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="badgeClip">
      <circle cx="128" cy="128" r="94"/>
    </clipPath>
    <linearGradient id="outerRing" x1="36" y1="34" x2="214" y2="224" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7DE97"/>
      <stop offset="0.42" stop-color="#C8932B"/>
      <stop offset="1" stop-color="#5E3B12"/>
    </linearGradient>
    <linearGradient id="innerRing" x1="64" y1="58" x2="192" y2="198" gradientUnits="userSpaceOnUse">
