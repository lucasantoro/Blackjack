  <circle cx="128" cy="128" r="92" fill="url(#glow)"/>

  <g clip-path="url(#badgeClip)">
    <image href="blackjack_logo.png" x="10" y="-10" width="236" height="236" preserveAspectRatio="xMidYMin slice"/>
    <rect x="34" y="34" width="188" height="188" fill="url(#glow)"/>
  </g>

  <circle cx="128" cy="128" r="94" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
  <path d="M70 214C86 201 104 194 128 194C152 194 170 201 186 214" stroke="#F0C868" stroke-opacity="0.42" stroke-width="4" stroke-linecap="round"/>
